apiVersion: v1
baseDomain: example.com              # your base DNS domain
metadata:
  name: sno                          # cluster name → api.sno.example.com

networking:
  networkType: OVNKubernetes
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  machineNetwork:
    - cidr: 192.168.1.0/24           # subnet of your SNO node

controlPlane:
  name: master
  replicas: 1
  hyperthreading: Enabled
  platform:
   none: {}
compute:
  - name: worker
    replicas: 0

platform:
  none: {}                           # baremetal UPI; use baremetal: {} for IPI/BMC

pullSecret: '{"auths":{"fake":{"auth":"Zm9vOmJhcgo="}}}'   # OKD uses fake pull secret
sshKey: |
  ssh-ed25519 AAAA...yourkey... user@host
